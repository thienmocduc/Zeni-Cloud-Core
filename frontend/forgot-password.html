<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Quên mật khẩu · Zeni Cloud</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-void: #030014;
  --bg-base: #08051F;
  --border: rgba(168, 139, 250, 0.18);
  --border-strong: rgba(168, 139, 250, 0.32);
  --ink-50: #FAF5FF;
  --ink-200: #C4B5FD;
  --ink-300: #9E8BE5;
  --ink-400: #7C6BB0;
  --crown: #A855F7;
  --crown-gold: #FDE68A;
  --crown-gold-deep: #F59E0B;
  --ok: #22D3EE;
  --err: #fb7185;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(168, 85, 247, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(99, 102, 241, 0.10) 0%, transparent 50%),
    var(--bg-void);
  color: var(--ink-50);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  width: 100%; max-width: 440px;
  background: linear-gradient(135deg, rgba(168, 85, 247, 0.04), rgba(99, 102, 241, 0.02)), rgba(10, 5, 32, 0.85);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-strong);
  border-radius: 14px;
  padding: 32px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(168, 85, 247, 0.15);
}
.logo { display: inline-flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; margin-bottom: 24px; }
.logo-z { width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, var(--crown-gold), var(--crown));
  color: #1a0938; font-weight: 900; font-size: 22px;
  display: flex; align-items: center; justify-content: center; }
h1 { font-size: 24px; margin-bottom: 6px; }
.sub { font-size: 13px; color: var(--ink-300); margin-bottom: 24px; line-height: 1.5; }
label { display: block; margin-top: 14px; margin-bottom: 6px; font-size: 12px; color: var(--ink-200); font-weight: 500; }
input { width: 100%; padding: 11px 13px;
  background: rgba(10, 5, 32, 0.6);
  border: 1px solid var(--border);
  border-radius: 8px; color: var(--ink-50);
  font-family: inherit; font-size: 14px; }
input:focus { outline: none; border-color: var(--crown); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15); }
.pwd-rules { font-family: 'Roboto Mono', monospace; font-size: 11px; color: var(--ink-400); margin-top: 6px; line-height: 1.7; }
.pwd-rules .ok { color: var(--ok); }
button.submit { width: 100%; margin-top: 24px; padding: 13px;
  background: linear-gradient(135deg, var(--crown-gold), var(--crown-gold-deep));
  color: #1a0938; border: none; border-radius: 8px;
  font-weight: 700; font-size: 14px; cursor: pointer; }
button.submit:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(253, 230, 138, 0.25); }
button.submit:disabled { opacity: 0.5; cursor: not-allowed; }
.msg { margin-top: 16px; padding: 11px 13px; border-radius: 8px; font-size: 13px; display: none; }
.msg.ok { display: block; background: rgba(34, 211, 238, 0.1); border: 1px solid rgba(34, 211, 238, 0.3); color: var(--ok); }
.msg.err { display: block; background: rgba(251, 113, 133, 0.1); border: 1px solid rgba(251, 113, 133, 0.3); color: var(--err); }
.footer-link { text-align: center; margin-top: 18px; font-size: 13px; color: var(--ink-400); }
.footer-link a { color: var(--crown); text-decoration: none; }
.footer-link a:hover { text-decoration: underline; }
.banner-expired {
  margin-bottom: 18px;
  padding: 12px;
  border-radius: 8px;
  background: rgba(251, 113, 133, 0.1);
  border: 1px solid rgba(251, 113, 133, 0.3);
  color: var(--err);
  font-size: 13px;
}
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-z">Z</div>
    <span>Zeni Cloud</span>
  </div>

  <!-- State A: Init (no token) — input email -->
  <div id="state-init">
    <h1>Quên mật khẩu</h1>
    <p class="sub">Nhập email tài khoản. Chúng tôi sẽ gửi link đặt lại mật khẩu (hiệu lực 1 giờ).</p>
    <form id="form-init" autocomplete="off">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email" placeholder="ban@congty.com">
      <button type="submit" class="submit" id="btn-init">Gửi link reset</button>
      <div class="msg" id="msg-init"></div>
    </form>
    <div class="footer-link"><a href="/app">← Quay lại đăng nhập</a></div>
  </div>

  <!-- State B: Reset (token in URL) — set new password -->
  <div id="state-reset" class="hidden">
    <h1>Đặt lại mật khẩu</h1>
    <p class="sub">Nhập mật khẩu mới — đủ mạnh, không trùng mật khẩu cũ.</p>
    <div id="banner-expired" class="banner-expired hidden"></div>
    <form id="form-reset" autocomplete="off">
      <label for="new">Mật khẩu mới</label>
      <input type="password" id="new" required minlength="10" autocomplete="new-password">
      <div class="pwd-rules" id="rules">
        <div data-rule="len">○ ≥ 10 ký tự</div>
        <div data-rule="upper">○ 1 chữ HOA</div>
        <div data-rule="lower">○ 1 chữ thường</div>
        <div data-rule="digit">○ 1 chữ số</div>
        <div data-rule="symbol">○ 1 ký tự đặc biệt</div>
      </div>
      <label for="conf">Xác nhận mật khẩu mới</label>
      <input type="password" id="conf" required minlength="10" autocomplete="new-password">
      <button type="submit" class="submit" id="btn-reset">Đặt lại mật khẩu</button>
      <div class="msg" id="msg-reset"></div>
    </form>
    <div class="footer-link"><a href="/app">← Đăng nhập</a></div>
  </div>
</div>

<script>
(function() {
  const url = new URL(window.location.href);
  const token = url.searchParams.get('token');

  function showMsg(id, kind, text) {
    const m = document.getElementById(id);
    m.className = 'msg ' + kind;
    m.textContent = text;
  }

  if (!token) {
    // ─── State A: Init ──────────────────────────────
    document.getElementById('form-init').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-init');
      const email = document.getElementById('email').value.trim().toLowerCase();
      btn.disabled = true; btn.textContent = 'Đang gửi...';
      try {
        const res = await fetch('/api/v1/auth/password/forgot/init', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        if (res.ok) {
          showMsg('msg-init', 'ok', '✓ Nếu email tồn tại, link reset đã được gửi. Kiểm tra hộp thư (cả Spam).');
          document.getElementById('email').disabled = true;
          btn.textContent = '✓ Đã gửi';
        } else {
          let detail = 'Gửi yêu cầu thất bại';
          try { const j = await res.json(); detail = j.detail || detail; } catch {}
          showMsg('msg-init', 'err', detail);
          btn.disabled = false; btn.textContent = 'Gửi link reset';
        }
      } catch (err) {
        showMsg('msg-init', 'err', 'Không kết nối được: ' + err.message);
        btn.disabled = false; btn.textContent = 'Gửi link reset';
      }
    });
    return;
  }

  // ─── State B: Reset ─────────────────────────────────
  document.getElementById('state-init').classList.add('hidden');
  document.getElementById('state-reset').classList.remove('hidden');

  // First check token validity
  (async () => {
    try {
      const res = await fetch('/api/v1/auth/password/forgot/status?token=' + encodeURIComponent(token));
      const j = await res.json();
      if (!j.valid) {
        const banner = document.getElementById('banner-expired');
        banner.classList.remove('hidden');
        const reason = j.reason === 'expired' ? 'đã hết hạn'
                     : j.reason === 'used' ? 'đã được sử dụng'
                     : 'không tồn tại';
        banner.textContent = '⚠ Link reset ' + reason + '. Vui lòng yêu cầu link mới.';
        document.getElementById('form-reset').style.display = 'none';
      }
    } catch (err) {
      // Best-effort — still allow form submit; backend will revalidate
    }
  })();

  const newEl = document.getElementById('new');
  const rules = document.getElementById('rules');
  const checks = {
    len: (s) => s.length >= 10,
    upper: (s) => /[A-Z]/.test(s),
    lower: (s) => /[a-z]/.test(s),
    digit: (s) => /[0-9]/.test(s),
    symbol: (s) => /[^A-Za-z0-9]/.test(s),
  };

  function updateRules() {
    const v = newEl.value;
    rules.querySelectorAll('[data-rule]').forEach(div => {
      const k = div.getAttribute('data-rule');
      const ok = checks[k](v);
      div.className = ok ? 'ok' : '';
      div.textContent = (ok ? '✓ ' : '○ ') + div.textContent.replace(/^[○✓]\s*/, '');
    });
  }
  newEl.addEventListener('input', updateRules);

  document.getElementById('form-reset').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-reset');
    const nw = newEl.value;
    const conf = document.getElementById('conf').value;

    if (!Object.values(checks).every(fn => fn(nw))) {
      showMsg('msg-reset', 'err', 'Mật khẩu mới chưa đủ mạnh.');
      return;
    }
    if (nw !== conf) {
      showMsg('msg-reset', 'err', 'Xác nhận mật khẩu không khớp.');
      return;
    }

    btn.disabled = true; btn.textContent = 'Đang xử lý...';
    try {
      const res = await fetch('/api/v1/auth/password/forgot/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password: nw }),
      });
      if (res.ok) {
        showMsg('msg-reset', 'ok', '✓ Đặt lại mật khẩu thành công. Đang chuyển sang đăng nhập...');
        setTimeout(() => { window.location.href = '/app'; }, 1800);
      } else {
        let detail = 'Đặt lại thất bại';
        try { const j = await res.json(); detail = j.detail || detail; } catch {}
        showMsg('msg-reset', 'err', detail);
        btn.disabled = false; btn.textContent = 'Đặt lại mật khẩu';
      }
    } catch (err) {
      showMsg('msg-reset', 'err', 'Không kết nối được: ' + err.message);
      btn.disabled = false; btn.textContent = 'Đặt lại mật khẩu';
    }
  });
})();
</script>
</body>
</html>
