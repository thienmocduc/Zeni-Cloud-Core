<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Đổi mật khẩu · Zeni Cloud</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-void: #030014;
  --bg-base: #08051F;
  --bg-card: #14142a;
  --border-soft: rgba(168, 139, 250, 0.08);
  --border: rgba(168, 139, 250, 0.18);
  --border-strong: rgba(168, 139, 250, 0.32);
  --ink-50: #FAF5FF;
  --ink-200: #C4B5FD;
  --ink-300: #9E8BE5;
  --ink-400: #7C6BB0;
  --crown: #A855F7;
  --crown-gold: #FDE68A;
  --crown-gold-deep: #F59E0B;
  --ok: #22D3EE;
  --err: #fb7185;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(168, 85, 247, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(99, 102, 241, 0.10) 0%, transparent 50%),
    var(--bg-void);
  color: var(--ink-50);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  width: 100%;
  max-width: 440px;
  background: linear-gradient(135deg, rgba(168, 85, 247, 0.04), rgba(99, 102, 241, 0.02)), rgba(10, 5, 32, 0.85);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-strong);
  border-radius: 14px;
  padding: 32px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(168, 85, 247, 0.15);
}
.logo {
  display: inline-flex; align-items: center; gap: 10px;
  font-weight: 800; font-size: 18px;
  color: var(--ink-50);
  margin-bottom: 24px;
}
.logo-z {
  width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, var(--crown-gold), var(--crown));
  color: #1a0938; font-weight: 900; font-size: 22px;
  display: flex; align-items: center; justify-content: center;
}
h1 { font-size: 24px; margin-bottom: 6px; }
.sub {
  font-size: 13px; color: var(--ink-300);
  margin-bottom: 24px; line-height: 1.5;
}
label {
  display: block; margin-top: 14px; margin-bottom: 6px;
  font-size: 12px; color: var(--ink-200);
  font-weight: 500;
}
input {
  width: 100%; padding: 11px 13px;
  background: rgba(10, 5, 32, 0.6);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--ink-50);
  font-family: inherit; font-size: 14px;
  transition: all 0.15s;
}
input:focus {
  outline: none;
  border-color: var(--crown);
  box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
}
.pwd-rules {
  font-family: 'Roboto Mono', monospace;
  font-size: 11px;
  color: var(--ink-400);
  margin-top: 6px; line-height: 1.7;
}
.pwd-rules .ok { color: var(--ok); }
.pwd-rules .pending { color: var(--ink-400); }
button.submit {
  width: 100%; margin-top: 24px;
  padding: 13px;
  background: linear-gradient(135deg, var(--crown-gold), var(--crown-gold-deep));
  color: #1a0938;
  border: none; border-radius: 8px;
  font-weight: 700; font-size: 14px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
button.submit:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(253, 230, 138, 0.25);
}
button.submit:disabled { opacity: 0.5; cursor: not-allowed; }
.msg {
  margin-top: 16px;
  padding: 11px 13px;
  border-radius: 8px;
  font-size: 13px;
  display: none;
}
.msg.ok { display: block; background: rgba(34, 211, 238, 0.1); border: 1px solid rgba(34, 211, 238, 0.3); color: var(--ok); }
.msg.err { display: block; background: rgba(251, 113, 133, 0.1); border: 1px solid rgba(251, 113, 133, 0.3); color: var(--err); }
.footer-link {
  text-align: center;
  margin-top: 18px;
  font-size: 13px;
  color: var(--ink-400);
}
.footer-link a { color: var(--crown); text-decoration: none; }
.footer-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-z">Z</div>
    <span>Zeni Cloud</span>
  </div>
  <h1>Đổi mật khẩu</h1>
  <p class="sub">Nhập mật khẩu hiện tại và mật khẩu mới. Mật khẩu mới phải đủ mạnh.</p>

  <form id="form-change" autocomplete="off">
    <label for="cur">Mật khẩu hiện tại</label>
    <input type="password" id="cur" required minlength="6" autocomplete="current-password">

    <label for="new">Mật khẩu mới</label>
    <input type="password" id="new" required minlength="10" autocomplete="new-password">
    <div class="pwd-rules" id="rules">
      <div data-rule="len" class="pending">○ ≥ 10 ký tự</div>
      <div data-rule="upper" class="pending">○ 1 chữ HOA</div>
      <div data-rule="lower" class="pending">○ 1 chữ thường</div>
      <div data-rule="digit" class="pending">○ 1 chữ số</div>
      <div data-rule="symbol" class="pending">○ 1 ký tự đặc biệt</div>
    </div>

    <label for="conf">Xác nhận mật khẩu mới</label>
    <input type="password" id="conf" required minlength="10" autocomplete="new-password">

    <button type="submit" class="submit" id="btn">Đổi mật khẩu</button>
    <div class="msg" id="msg"></div>
  </form>

  <div class="footer-link">
    <a href="/app#settings">← Quay lại Settings</a>
  </div>
</div>

<script>
(function() {
  const newEl = document.getElementById('new');
  const rules = document.getElementById('rules');
  const checks = {
    len: (s) => s.length >= 10,
    upper: (s) => /[A-Z]/.test(s),
    lower: (s) => /[a-z]/.test(s),
    digit: (s) => /[0-9]/.test(s),
    symbol: (s) => /[^A-Za-z0-9]/.test(s),
  };

  function updateRules() {
    const v = newEl.value;
    rules.querySelectorAll('[data-rule]').forEach(div => {
      const k = div.getAttribute('data-rule');
      const ok = checks[k](v);
      div.className = ok ? 'ok' : 'pending';
      div.textContent = (ok ? '✓ ' : '○ ') + div.textContent.replace(/^[○✓]\s*/, '');
    });
  }
  newEl.addEventListener('input', updateRules);

  function allRulesPass() {
    return Object.values(checks).every(fn => fn(newEl.value));
  }

  function showMsg(kind, text) {
    const m = document.getElementById('msg');
    m.className = 'msg ' + kind;
    m.textContent = text;
  }

  document.getElementById('form-change').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const cur = document.getElementById('cur').value;
    const nw = newEl.value;
    const conf = document.getElementById('conf').value;

    if (!allRulesPass()) {
      showMsg('err', 'Mật khẩu mới chưa đủ mạnh — đáp ứng tất cả 5 điều kiện.');
      return;
    }
    if (nw !== conf) {
      showMsg('err', 'Xác nhận mật khẩu không khớp.');
      return;
    }
    if (nw === cur) {
      showMsg('err', 'Mật khẩu mới phải khác mật khẩu cũ.');
      return;
    }

    // Read token from localStorage (matches existing index.html pattern)
    const session = JSON.parse(localStorage.getItem('zeniCloud_session_v1') || '{}');
    const token = session.access_token || session.token || localStorage.getItem('zeni_access_token');
    if (!token) {
      showMsg('err', 'Phiên hết hạn — vui lòng đăng nhập lại.');
      setTimeout(() => { window.location.href = '/app'; }, 1500);
      return;
    }

    btn.disabled = true; btn.textContent = 'Đang xử lý...';
    try {
      const res = await fetch('/api/v1/auth/password/change', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token,
        },
        body: JSON.stringify({ old_password: cur, new_password: nw }),
      });
      if (res.ok) {
        showMsg('ok', '✓ Đổi mật khẩu thành công. Đang chuyển về Settings...');
        setTimeout(() => { window.location.href = '/app#settings'; }, 1500);
      } else {
        let detail = 'Đổi mật khẩu thất bại';
        try { const j = await res.json(); detail = j.detail || detail; } catch {}
        showMsg('err', detail);
        if (res.status === 401) {
          setTimeout(() => { window.location.href = '/app'; }, 1800);
        }
        btn.disabled = false; btn.textContent = 'Đổi mật khẩu';
      }
    } catch (err) {
      showMsg('err', 'Không kết nối được: ' + err.message);
      btn.disabled = false; btn.textContent = 'Đổi mật khẩu';
    }
  });
})();
</script>
</body>
</html>
