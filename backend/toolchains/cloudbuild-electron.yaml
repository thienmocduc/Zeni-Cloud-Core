steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.electron', '-t', 'gcr.io/zeni-cloud-core/build-farm/electron:latest', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/zeni-cloud-core/build-farm/electron:latest']
images:
  - gcr.io/zeni-cloud-core/build-farm/electron:latest
options:
  machineType: E2_HIGHCPU_8
timeout: 1800s
