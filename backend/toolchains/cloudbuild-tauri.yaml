steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.tauri', '-t', 'gcr.io/zeni-cloud-core/build-farm/tauri:2', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/zeni-cloud-core/build-farm/tauri:2']
images:
  - gcr.io/zeni-cloud-core/build-farm/tauri:2
options:
  machineType: E2_HIGHCPU_8
timeout: 1800s
