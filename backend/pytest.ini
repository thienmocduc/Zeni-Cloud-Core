[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:cacheprovider
markers =
    smoke: smoke tests against the running app
    slow: tests that take >5s
    integration: requires external services (Postgres, Redis, GCP)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
