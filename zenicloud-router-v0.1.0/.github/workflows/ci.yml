name: ZeniCloud Router CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ --cov=src --cov-report=term-missing
        env:
          USE_MOCK_ADAPTERS: "true"
          ENV: dev

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Check for hardcoded secrets
        run: |
          ! grep -rE "sk-[a-zA-Z0-9_-]{20,}|AKIA[0-9A-Z]{16}" src/ tests/ \
            --include="*.py" \
            --exclude="logging.py" \
            --exclude="test_*.py"

  docker:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t zenicloud-router:${{ github.sha }} .

      - name: Smoke test image
        run: |
          docker run -d -p 8080:8080 --name router \
            -e USE_MOCK_ADAPTERS=true \
            zenicloud-router:${{ github.sha }}
          sleep 5
          curl --fail http://localhost:8080/health
          docker stop router
